<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Costa Propertys</title>
    <style>
        :root {
            --primary-bg: #fafafa;
            --header-bg: #ffffff;
            --border-color: #dbdbdb;
            --text-main: #262626;
            --accent: #0095f6;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: var(--primary-bg); margin: 0; }
        header { background: var(--header-bg); border-bottom: 1px solid var(--border-color); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { font-weight: bold; font-size: 1.5rem; }
        .lang-selector { cursor: pointer; padding: 5px; border: 1px solid var(--border-color); border-radius: 4px; }
        .container { max-width: 600px; margin: 20px auto; padding: 0 20px; }
        .post { background: white; border: 1px solid var(--border-color); border-radius: 8px; margin-bottom: 20px; }
        .post-header { padding: 15px; font-weight: bold; }
        .post-img { width: 100%; height: 400px; background: #eee; display: flex; align-items: center; justify-content: center; }
        .post-content { padding: 15px; }
        button { background: var(--accent); color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; margin-top: 10px; width: 100%; }
    </style>
</head>
<body>

<header>
    <div class="logo">Costa Propertys</div>
    <select class="lang-selector" onchange="changeLanguage(this.value)">
        <option value="pt">PT</option>
        <option value="en">EN</option>
        <option value="fr">FR</option>
    </select>
</header>

<div class="container">
    <div class="post">
        <div class="post-header" id="post-title">Apartamento de Luxo no Porto</div>
        <div class="post-img">Imagem do Imóvel</div>
        <div class="post-content">
            <p id="post-desc">Espaçoso apartamento localizado no centro histórico do Porto.</p>
            <button id="btn-contact">Contactar Agora</button>
        </div>
    </div>
</div>

<script>
    const translations = {
        pt: {
            title: "Apartamento de Luxo no Porto",
            desc: "Espaçoso apartamento localizado no centro histórico do Porto.",
            button: "Contactar Agora"
        },
        en: {
            title: "Luxury Apartment in Porto",
            desc: "Spacious apartment located in the historic center of Porto.",
            button: "Contact Now"
        },
        fr: {
            title: "Appartement de Luxe à Porto",
            desc: "Appartement spacieux situé dans le centre historique de Porto.",
            button: "Contacter Maintenant"
        }
    };

    function changeLanguage(lang) {
        document.getElementById('post-title').innerText = translations[lang].title;
        document.getElementById('post-desc').innerText = translations[lang].desc;
        document.getElementById('btn-contact').innerText = translations[lang].button;
        localStorage.setItem('userLang', lang);
    }
    
    window.onload = () => {
        const savedLang = localStorage.getItem('userLang') || 'pt';
        document.querySelector('.lang-selector').value = savedLang;
        changeLanguage(savedLang);
    };
</script>
</body>
</html>
