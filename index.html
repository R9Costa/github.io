<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Costa Estate Stewardship</title>
    <style>
        body { font-family: 'Playfair Display', serif; margin: 0; background: #f9f7f2; color: #333; }
        header { padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; background: #fff; }
        .lang-nav button { background: none; border: none; cursor: pointer; font-weight: bold; padding: 5px; }
        
        .hero { background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1582407947304-fd86f028f716?q=80&w=1600'); height: 60vh; background-size: cover; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; }
        .lang-content { display: none; }
        .active { display: block; }
    </style>
</head>
<body>

    <header>
        <div style="font-weight: bold; font-size: 20px;">COSTA ESTATE STEWARDSHIP</div>
        <nav class="lang-nav">
            <button onclick="showLang('pt')">PT</button> | 
            <button onclick="showLang('en')">EN</button> | 
            <button onclick="showLang('fr')">FR</button>
        </nav>
    </header>

    <section class="hero">
        <h1 id="title">Bespoke Property Management</h1>
        
        <div id="pt" class="lang-content active">
            <p>A sua casa no Norte de Portugal, mantida com perfeição.</p>
        </div>
        <div id="en" class="lang-content">
            <p>Your home in the North of Portugal, impeccably maintained.</p>
        </div>
        <div id="fr" class="lang-content">
            <p>Votre résidence dans le Nord du Portugal, entretenue à la perfection.</p>
        </div>
    </section>

    <script>
        function showLang(lang) {
            document.querySelectorAll('.lang-content').forEach(div => div.classList.remove('active'));
            document.getElementById(lang).classList.add('active');
        }
    </script>
</body>
</html>
